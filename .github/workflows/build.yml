name: NothingsVN Oplus ROM Build

on:
  workflow_dispatch:
    inputs:
      input_url:
        description: 'URL of the ROM to build'
        required: true
      
jobs:
  Initialize:
    runs-on: ubuntu-latest
    steps:
      - name: Clean All Unused file,application
        run: |
          docker rmi `docker images -q` || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/sudo apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Set up Time
        run: |
          echo "Setting Vienam timezone"
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh

  Build:
    needs: Initialize
    runs-on: ubuntu-latest
    steps:
      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Stuff
        run: |
          sudo bash setup.sh
        
      - name: Giving permission
        run: |
          sudo chmod 777 -R *

      - name: Build ROM...
        env:
          INPUT_URL: ${{ inputs.input_url }}
        run: |
          sudo bash build.sh "$INPUT_URL"

      - name: Pack ROM...
        run: |
          sudo bash packROM.sh n

      - name: Setup Rclone...
        run: |
          sudo -E bash uploadROM.sh setup "${{ secrets.GH_TOKEN }}" "${{ secrets.GH_REPO }}" "${{ secrets.RCLONE_TOKEN_PATH }}"

      - name: Upload ROM...
        run: |
          sudo -E bash uploadROM.sh
      
      - name: Update Database and Notification to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TG_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }} # Thêm Chat ID vào Secrets của GitHub
          DEVICE_MODEL: $(cat "$work_dir/bin/ddevice/device_model.txt")
          DOWNLOAD_LINK: "https://drive.google.com/drive/folders/1vxdFqOk6AXtb_e1Z8n_n1o0Bp9Qy41BK?usp=drive_link" # Thay bằng link thực tế hoặc biến môi trường chứa link từ step trước
        run: |
          echo "Gửi thông báo tới Telegram..."
          
          curl -s -X POST https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage \
            -H 'Content-Type: application/json' \
            -d '{
              "chat_id": "'"$TELEGRAM_CHAT_ID"'",
              "text": "✅ *Build ROM OnePlus thành công!*\n📦 Check ROM tại đây: [Click để tải]('"$DOWNLOAD_LINK"')",
              "parse_mode": "Markdown"
            }'

          
