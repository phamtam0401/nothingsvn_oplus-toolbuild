name: 600MB Upload Test

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 🧪 CREATE 600MB FILE
      # =========================
      - name: Create 600MB test file
        run: |
          mkdir -p upload

          echo "Creating 600MB file..."
          dd if=/dev/zero of=upload/test_600mb.bin bs=1M count=600

          ls -lh upload

      # =========================
      # 🚀 UPLOAD TO PHONE
      # =========================
      - name: Upload to phone
        run: |
          FILE="upload/test_600mb.bin"

          echo "Uploading: $FILE"

          curl -X POST \
            --data-binary @"$FILE" \
            -H "X-Filename: test_600mb.bin" \
            "${{ secrets.PHONE_UPLOAD_URL }}" \
            --fail \
            --show-error \
            --silent

      # =========================
      # ✅ DONE
      # =========================
      - name: Done
        run: |
          echo "600MB upload test completed"
