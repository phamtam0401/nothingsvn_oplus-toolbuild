name: Test Upload to Phone via Cloudflare

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 🧪 CREATE TEST FILE
      # =========================
      - name: Create test files
        run: |
          mkdir -p upload

          echo "===== GITHUB ACTIONS TEST =====" > upload/test.txt
          echo "Time: $(date)" >> upload/test.txt
          echo "Upload via Cloudflare Tunnel" >> upload/test.txt

          # tạo file zip giả lập ROM
          dd if=/dev/zero of=upload/test.zip bs=1M count=5

          echo "Files created:"
          ls -lh upload

      # =========================
      # 🚀 UPLOAD TO PHONE
      # =========================
      - name: Upload to Phone
        run: |
          FILE="upload/test.zip"

          echo "Uploading: $FILE"

          curl -X POST \
            -F "file=@$FILE" \
            "${{ secrets.PHONE_UPLOAD_URL }}" \
            --fail \
            --show-error \
            --silent

      # =========================
      # ✅ DONE LOG
      # =========================
      - name: Done
        run: |
          echo "Upload completed successfully"
